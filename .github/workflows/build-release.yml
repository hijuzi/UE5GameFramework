name: Build and Release UE5PSOPackager

on:
  push:
    tags:
      - 'v*'               # 推送 v1.0.0 / v2.1.3 等版本标签时触发
  workflow_dispatch:        # 也允许手动触发（可选择分支）

permissions:
  contents: write           # 创建 Release 需要写权限

jobs:
  build:
    runs-on: windows-latest
    defaults:
      run:
        shell: cmd          # 使用 cmd，PyInstaller 在 Windows 上更稳定
        working-directory: UE5PSOPackager

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'UE5PSOPackager/requirements.txt'

      - name: 安装依赖
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: 提取版本号
        id: version
        run: |
          :: 从 git tag 提取版本号（去掉前缀 v）
          for /f "delims=" %%i in ('git describe --tags --abbrev=0') do set TAG=%%i
          set VERSION=%TAG:~1%
          echo VERSION=%VERSION%>> %GITHUB_OUTPUT
          echo 当前版本: %VERSION%

      - name: 写入版本文件
        run: |
          echo __version__ = "%VERSION%" > version.py
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}

      - name: 构建 exe
        run: |
          python build_exe.py

      - name: 检查产物
        run: |
          dir dist\

      - name: 创建 GitHub Release 并上传
        uses: softprops/action-gh-release@v2
        with:
          name: UE5PSOPackager ${{ steps.version.outputs.VERSION }}
          body: |
            ## UE5PSOPackager ${{ steps.version.outputs.VERSION }}

            自动构建的版本。完整发布说明请见提交记录。

            ### 使用方法
            1. 下载 `UE5PSOPackager.zip`
            2. 解压到任意目录
            3. 双击 `UE5PSOPackager.exe` 运行

            ### 校验
            > SHA256 校验值见下方 `checksums.txt`
          files: |
            UE5PSOPackager/dist/UE5PSOPackager.exe
          generate_release_notes: true
          fail_on_unmatched_files: true
